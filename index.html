<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Host Viewer</title>
    <style>
        body { background: #121212; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #remoteVideo { width: 80vw; max-width: 800px; min-height: 400px; border: 2px solid #444; background: #000; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: crosshair; }
        #startBtn { padding: 12px 24px; margin-bottom: 15px; cursor: pointer; background: #4caf50; color: white; border: none; border-radius: 4px; font-weight: bold; font-size: 16px; }
        #startBtn:hover { background: #45a049; }
    </style>
</head>
<body>
    
    <h2>Live Device Stream</h2>
    <h4 id="statusText" style="color: #ff9800;">🌐 Fetching network credentials...</h4>
    
    <!-- Button bypasses public domain autoplay restrictions -->
    <button id="startBtn" style="display: none;">Connect to Stream</button>

    <!-- Muted & Controls are required alongside the button -->
    <video id="remoteVideo" autoplay muted playsinline></video>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        // Use your Render URL. Ensure it is HTTPS if deployed on Vercel.
        const socket = io('https://remote-ekp4.onrender.com', { 
            transports: ['websocket'], 
            upgrade: false 
        }); 
        
        const videoElement = document.getElementById('remoteVideo');
        const statusText = document.getElementById('statusText');
        const startBtn = document.getElementById('startBtn');
        
        let peerConnection;
        let iceServers = [];
        let currentStreamerId = null; // Stores phone's ID for mouse controls

        // ==========================================
        // 1. FETCH TURN CREDENTIALS
        // ==========================================
        async function fetchIceServers() {
            try {
                const response = await fetch("https://remotehost.metered.live/api/v1/turn/credentials?apiKey=398a87f2720119c27c0aeca45a59eae3d949");
                iceServers = await response.json();
                console.log("✅ TURN Servers Loaded:", iceServers);
                statusText.textContent = "🟢 Ready. Waiting for phone...";
                startBtn.style.display = "block"; 
            } catch (error) {
                console.error("❌ Failed to fetch TURN servers:", error);
                iceServers = [{ urls: 'stun:stun.l.google.com:19302' }];
                statusText.textContent = "🟢 Ready (Fallback STUN). Waiting for phone...";
                startBtn.style.display = "block";
            }
        }

        fetchIceServers();

        // ==========================================
        // 2. SOCKET INIT & UI CONTROLS
        // ==========================================
        startBtn.onclick = () => {
            socket.emit('request_stream');
            startBtn.style.display = 'none';
            statusText.textContent = "🟡 Requesting stream...";
        };

        socket.on('connect', () => {
            console.log('Connected to signaling server');
        });

        socket.on('streamer_online', () => {
            console.log('Phone just came online! Click connect.');
            startBtn.style.display = 'block';
        });

        socket.on('streamer_offline', () => {
            console.log('Phone disconnected.');
            statusText.textContent = "🔴 Phone disconnected.";
            statusText.style.color = "#f44336";
            if (peerConnection) {
                peerConnection.close();
            }
        });

        // ==========================================
        // 3. WEBRTC NEGOTIATION
        // ==========================================
        socket.on('webrtc_offer', async (data) => {
            console.log("📥 Received WebRTC Offer");
            statusText.textContent = "🟡 Negotiating Video...";
            
            currentStreamerId = data.from; // Save ID to target clicks
            
            peerConnection = new RTCPeerConnection({ iceServers: iceServers });
            
            peerConnection.oniceconnectionstatechange = () => {
                console.log("🧊 ICE State:", peerConnection.iceConnectionState);
                if(peerConnection.iceConnectionState === "connected") {
                    statusText.textContent = "🟢 Live Stream Connected!";
                    statusText.style.color = "#4caf50";
                }
            };

            peerConnection.ontrack = (event) => {
                console.log("🎥 VIDEO TRACK RECEIVED!");
                videoElement.srcObject = event.streams[0];
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('ice_candidate', { to: data.from, candidate: event.candidate });
                }
            };

            await peerConnection.setRemoteDescription(new RTCSessionDescription({ 
                type: 'offer', 
                sdp: data.sdp 
            }));
            
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            socket.emit('webrtc_answer', { 
                to: data.from, 
                sdp: answer.sdp 
            });
        });

        socket.on('ice_candidate', async (data) => {
            console.log("❄️ Received ICE candidate");
            if (peerConnection) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                } catch (e) {
                    console.error("Error adding ice candidate", e);
                }
            }
        });

        
        // ==========================================
        // 4. REMOTE MOUSE CONTROLS (ADVANCED MAPPER)
        
        let isPointerDown = false;
        let startX = 0, startY = 0;
        let startTime = 0;

        function getMappedCoordinates(e) {
            const rect = videoElement.getBoundingClientRect();
            const videoRatio = videoElement.videoWidth / videoElement.videoHeight;
            const elementRatio = rect.width / rect.height;

            let renderWidth = rect.width, renderHeight = rect.height;
            let offsetX = 0, offsetY = 0;

            if (elementRatio > videoRatio) {
                renderWidth = renderHeight * videoRatio;
                offsetX = (rect.width - renderWidth) / 2;
            } else {
                renderHeight = renderWidth / videoRatio;
                offsetY = (rect.height - renderHeight) / 2;
            }

            const xInside = (e.clientX - rect.left) - offsetX;
            const yInside = (e.clientY - rect.top) - offsetY;

            // Clamp values between 0 and 1 so dragging off-screen doesn't crash Android
            const xPercent = Math.max(0, Math.min(1, xInside / renderWidth));
            const yPercent = Math.max(0, Math.min(1, yInside / renderHeight));

            return { xPercent, yPercent };
        }

        videoElement.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (!currentStreamerId) return;
            
            isPointerDown = true;
            startTime = Date.now();
            const coords = getMappedCoordinates(e);
            startX = coords.xPercent;
            startY = coords.yPercent;
        });

        videoElement.addEventListener('pointerup', (e) => {
            e.preventDefault();
            if (!currentStreamerId || !isPointerDown) return;
            isPointerDown = false;

            const coords = getMappedCoordinates(e);
            const duration = Date.now() - startTime;
            
            // Calculate how far the mouse moved
            const distance = Math.hypot(coords.xPercent - startX, coords.yPercent - startY);

            // If movement is tiny (less than 2% of screen), it's a Tap. Otherwise, it's a Swipe.
            if (distance < 0.02) {
                console.log(`🖱️ Action: TAP -> X: ${coords.xPercent.toFixed(3)}, Y: ${coords.yPercent.toFixed(3)}`);
                socket.emit('remote_input', {
                    to: currentStreamerId,
                    action: 'tap',
                    x: coords.xPercent,
                    y: coords.yPercent
                });
            } else {
                console.log(`🖱️ Action: SWIPE -> Duration: ${duration}ms`);
                socket.emit('remote_input', {
                    to: currentStreamerId,
                    action: 'swipe',
                    startX: startX,
                    startY: startY,
                    endX: coords.xPercent,
                    endY: coords.yPercent,
                    // Keep swipe duration between 200ms and 1000ms for smooth Android rendering
                    duration: Math.min(Math.max(duration, 200), 1000) 
                });
            }
        });
    </script>
</body>
</html>
